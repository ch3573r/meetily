name: ClawScribe Windows Release

on:
  workflow_dispatch:
    inputs:
      feature:
        description: Build acceleration feature
        required: true
        type: choice
        default: cpu
        options:
          - cpu
          - vulkan
          - cuda
          - openblas
      check-only:
        description: Run validation only, without producing installers
        required: true
        type: boolean
        default: false
      build-ref:
        description: Commit, branch, or tag to build
        required: false
        type: string
        default: ""
      directml:
        description: Include the DirectML EP (GPU transcription for Parakeet/Nemotron). On by default; toggle-gated at runtime (defaults off). Set false to exclude.
        required: false
        type: boolean
        default: true
      publish:
        description: Publish the installers to a GitHub Release (tag = v<package.json version>). Release assets don't count against the Actions-artifact quota.
        required: false
        type: boolean
        default: false

concurrency:
  group: clawscribe-windows-release-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build ClawScribe Windows installers
    runs-on: [self-hosted, windows, clawscribe]
    permissions:
      contents: write # create/update GitHub Releases when publish=true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
          # Self-hosted runner: keep untracked build outputs (target/, node_modules)
          # between runs so cargo/tauri builds are incremental. Source files are
          # still reset to the checked-out ref; only ignored artifacts persist.
          clean: false

      - name: Checkout requested build ref
        if: ${{ inputs['build-ref'] != '' }}
        shell: pwsh
        run: |
          git checkout --detach "${{ inputs['build-ref'] }}"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Prepare Windows installer version
        if: ${{ !inputs['check-only'] }}
        shell: pwsh
        run: |
          $sourceVersion = node -p "require('./frontend/package.json').version"
          $installerVersion = $sourceVersion -replace "-.*$", ""
          if ($sourceVersion -ne $installerVersion) {
            $tauriConfigPath = "frontend\src-tauri\tauri.conf.json"
            $tauriConfig = Get-Content -LiteralPath $tauriConfigPath -Raw | ConvertFrom-Json
            $tauriConfig.version = $installerVersion
            $tauriConfig | ConvertTo-Json -Depth 100 | Set-Content -LiteralPath $tauriConfigPath -Encoding utf8
          }
          "CLAWSCRIBE_SOURCE_VERSION=$sourceVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CLAWSCRIBE_INSTALLER_VERSION=$installerVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      # Build cache is provided by the self-hosted runner's persistent disk
      # (CARGO_HOME=C:\cargo for the registry, plus clean:false above to keep
      # target/ between runs). No GitHub Actions cache is used, so nothing is
      # written to the repo's Actions cache storage.

      - name: Install LLVM
        shell: pwsh
        run: |
          # Pin LLVM 20.x: bindgen 0.69 (via whisper-rs-sys) mis-parses the
          # whisper_full_params struct with clang 21+, dropping fields and
          # failing the build. 20.1.8 matches the GitHub-hosted image.
          choco install llvm --version=20.1.8 -y --no-progress --allow-downgrade
          $llvmBin = "C:\Program Files\LLVM\bin"
          "LIBCLANG_PATH=$llvmBin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "PATH=$llvmBin;$env:PATH" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build llama-helper sidecar
        shell: pwsh
        run: |
          cargo build -p llama-helper --release --target x86_64-pc-windows-msvc
          New-Item -ItemType Directory -Force -Path frontend\src-tauri\binaries | Out-Null
          Copy-Item target\x86_64-pc-windows-msvc\release\llama-helper.exe frontend\src-tauri\binaries\llama-helper-x86_64-pc-windows-msvc.exe -Force

      - name: Stage Codex app-server runtime
        if: ${{ !inputs['check-only'] }}
        shell: pwsh
        run: |
          .\frontend\scripts\stage-codex-runtime.ps1 -TauriRoot "frontend\src-tauri"

      - name: Verify app and installer icons
        shell: pwsh
        run: |
          .\frontend\scripts\verify-brand-icons.ps1 -FrontendRoot "frontend"

      - name: Build release installers
        if: ${{ !inputs['check-only'] }}
        shell: pwsh
        env:
          # Signs the Tauri updater artifacts (.sig) when createUpdaterArtifacts
          # is true. Empty/absent on forks without the secret -> build still works,
          # just unsigned-for-update.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          $feature = "${{ inputs.feature }}"
          # cpu is the implicit default (no GPU feature); others map 1:1.
          $features = if ($feature -eq "cpu") { "" } else { $feature }
          if ("${{ inputs.directml }}" -eq "true") {
            $features = if ($features) { "$features,directml" } else { "directml" }
          }
          Remove-Item -LiteralPath "frontend\src-tauri\target\release\bundle\msi" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -LiteralPath "frontend\src-tauri\target\release\bundle\nsis" -Recurse -Force -ErrorAction SilentlyContinue
          cd frontend
          pnpm install --frozen-lockfile
          pnpm build
          if ($features) {
            pnpm exec tauri build -- --features $features
          } else {
            pnpm exec tauri build
          }

      - name: Write build metadata
        if: ${{ !inputs['check-only'] }}
        shell: pwsh
        run: |
          $bundleRoot = "frontend\src-tauri\target\release\bundle"
          $sourceVersion = $env:CLAWSCRIBE_SOURCE_VERSION
          $installerVersion = $env:CLAWSCRIBE_INSTALLER_VERSION
          $commit = git rev-parse HEAD
          $shortCommit = git rev-parse --short HEAD
          $buildDateUtc = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          $upstreamBaseVersion = "0.4.0"
          $expectedMsi = "ClawScribe_${installerVersion}_x64_en-US.msi"
          $expectedNsis = "ClawScribe_${installerVersion}_x64-setup.exe"
          $sourceMsi = Get-ChildItem -Path "." -Recurse -File -Filter $expectedMsi |
            Sort-Object LastWriteTimeUtc -Descending |
            Select-Object -First 1
          $sourceNsis = Get-ChildItem -Path "." -Recurse -File -Filter $expectedNsis |
            Sort-Object LastWriteTimeUtc -Descending |
            Select-Object -First 1
          if (-not $sourceMsi) {
            throw "No current-version ClawScribe MSI artifact '$expectedMsi' was found after the Windows build."
          }
          if (-not $sourceNsis) {
            throw "No current-version ClawScribe NSIS setup artifact '$expectedNsis' was found after the Windows build."
          }
          New-Item -ItemType Directory -Force -Path (Join-Path $bundleRoot "msi") | Out-Null
          New-Item -ItemType Directory -Force -Path (Join-Path $bundleRoot "nsis") | Out-Null
          $msiName = $sourceMsi.Name
          $nsisName = $sourceNsis.Name
          if ($sourceVersion -ne $installerVersion) {
            $msiName = $msiName.Replace($installerVersion, $sourceVersion)
            $nsisName = $nsisName.Replace($installerVersion, $sourceVersion)
          }
          $destMsi = Join-Path $bundleRoot "msi\$msiName"
          $destNsis = Join-Path $bundleRoot "nsis\$nsisName"
          $destMsiFull = [System.IO.Path]::GetFullPath($destMsi)
          $destNsisFull = [System.IO.Path]::GetFullPath($destNsis)
          if ($sourceMsi.FullName -ne $destMsiFull) {
            Move-Item -LiteralPath $sourceMsi.FullName -Destination $destMsi -Force
          }
          if ($sourceNsis.FullName -ne $destNsisFull) {
            $sourceNsisSig = "$($sourceNsis.FullName).sig"
            $destNsisSig = "$destNsis.sig"
            Move-Item -LiteralPath $sourceNsis.FullName -Destination $destNsis -Force
            if (Test-Path -LiteralPath $sourceNsisSig -PathType Leaf) {
              Move-Item -LiteralPath $sourceNsisSig -Destination $destNsisSig -Force
            }
          }
          $artifactFiles = @(
            Get-Item -LiteralPath $destMsi
            Get-Item -LiteralPath $destNsis
          )
          $resolvedBundleRoot = (Resolve-Path -LiteralPath $bundleRoot).Path
          $checksumLines = foreach ($artifact in $artifactFiles | Sort-Object FullName) {
            $hash = Get-FileHash -Algorithm SHA256 -LiteralPath $artifact.FullName
            $relativePath = [System.IO.Path]::GetRelativePath($resolvedBundleRoot, $artifact.FullName).Replace("\", "/")
            "$($hash.Hash.ToLowerInvariant())  $relativePath"
          }
          $checksumLines | Set-Content -LiteralPath (Join-Path $bundleRoot "SHA256SUMS.txt") -Encoding ascii
          $metadata = @(
            "product=ClawScribe",
            "version=$sourceVersion",
            "upstream_base_version=$upstreamBaseVersion",
            "installer_product_version=$installerVersion",
            "build_commit=$commit",
            "build_commit_short=$shortCommit",
            "build_date_utc=$buildDateUtc",
            "codex_runtime_version=0.139.0",
            "codex_runtime_target=x86_64-pc-windows-msvc",
            "codex_runtime_source_package=@openai/codex@0.139.0-win32-x64",
            "codex_runtime_source_url=https://registry.npmjs.org/@openai/codex/-/codex-0.139.0-win32-x64.tgz",
            "codex_runtime_sha256=77a84f8078400467ade4301d827b8bcea2d29b6838c9cd162bf3573b7ef97e10",
            "codex_runtime_license=Apache-2.0",
            "workflow_ref=${{ github.ref }}",
            "requested_build_ref=${{ inputs['build-ref'] || github.ref }}"
          )
          $metadata | Set-Content -LiteralPath (Join-Path $bundleRoot "BUILD-METADATA.txt") -Encoding ascii

      - name: Run validation only
        if: ${{ inputs['check-only'] }}
        shell: pwsh
        run: |
          cd frontend
          .\scripts\build-windows-release.ps1 -Feature ${{ inputs.feature }} -CheckOnly

      - name: Upload Windows installers
        # Skip on publish runs: the GitHub Release is the distribution there, so
        # we avoid the Actions-artifact quota entirely. Dev (non-publish) runs
        # still get a downloadable artifact.
        if: ${{ !inputs['check-only'] && !inputs.publish }}
        uses: actions/upload-artifact@v4
        with:
          # Stable per-variant name (no per-commit sha) + overwrite so each
          # variant keeps exactly ONE latest artifact (~287MB) instead of
          # accumulating one per commit. The free tier only includes 500MB of
          # Actions storage; the old sha-suffixed name climbed past that and
          # blocked uploads ("Artifact storage quota has been hit"). The commit
          # sha stays traceable via the run page and the bundled
          # BUILD-METADATA.txt.
          name: clawscribe-windows-${{ inputs.feature }}${{ inputs.directml && '-directml' || '' }}
          path: |
            frontend/src-tauri/target/release/bundle/msi/*.msi
            frontend/src-tauri/target/release/bundle/nsis/*.exe
            frontend/src-tauri/target/release/bundle/SHA256SUMS.txt
            frontend/src-tauri/target/release/bundle/BUILD-METADATA.txt
          if-no-files-found: error
          overwrite: true
          retention-days: 7

      - name: Prepare release notes
        if: ${{ inputs.publish && !inputs['check-only'] }}
        shell: pwsh
        run: |
          $bundleRoot = "frontend\src-tauri\target\release\bundle"
          $version = $env:CLAWSCRIBE_SOURCE_VERSION
          $short = git rev-parse --short HEAD
          # Built line-by-line (no backticks) to avoid PowerShell here-string escaping.
          $lines = @(
            "ClawScribe $version ($short) - ${{ inputs.feature }} build (DirectML: ${{ inputs.directml }}).",
            "",
            "> Unsigned installer. ClawScribe is not yet code-signed, so Windows",
            "> SmartScreen may warn on first run: click More info -> Run anyway to",
            "> install. Code signing is planned for a later release.",
            "",
            "### Install",
            "- Recommended: the ``*_x64-setup.exe`` (NSIS) installer",
            "- Or the ``*_x64_en-US.msi``",
            "",
            "### SHA-256 checksums",
            ""
          )
          $lines += (Get-Content -LiteralPath (Join-Path $bundleRoot "SHA256SUMS.txt"))
          $lines | Set-Content -LiteralPath (Join-Path $bundleRoot "RELEASE-NOTES.md") -Encoding utf8

      - name: Generate updater manifest (latest.json)
        if: ${{ inputs.publish && !inputs['check-only'] }}
        shell: pwsh
        run: |
          $bundleRoot = "frontend\src-tauri\target\release\bundle"
          $version = $env:CLAWSCRIBE_SOURCE_VERSION
          # Published installer is the source-version-named NSIS setup (renamed by
          # the metadata step). Its signature signs the file bytes, so the .sig from
          # the original-named artifact is valid for the renamed copy too.
          $nsisName = "ClawScribe_${version}_x64-setup.exe"
          $sig = Get-ChildItem -Path (Join-Path $bundleRoot "nsis") -Filter "${nsisName}.sig" |
            Select-Object -First 1
          if (-not $sig) {
            throw "No .sig found - is createUpdaterArtifacts true and TAURI_SIGNING_PRIVATE_KEY set?"
          }
          $signature = (Get-Content -LiteralPath $sig.FullName -Raw).Trim()
          $url = "https://github.com/ch3573r/ClawScribe/releases/download/v$version/$nsisName"
          $pubDate = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          $manifest = [ordered]@{
            version   = $version
            notes     = "See https://github.com/ch3573r/ClawScribe/releases/tag/v$version"
            pub_date  = $pubDate
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{ signature = $signature; url = $url }
            }
          }
          $manifest | ConvertTo-Json -Depth 10 | Set-Content -LiteralPath (Join-Path $bundleRoot "latest.json") -Encoding utf8

      - name: Publish GitHub Release
        if: ${{ inputs.publish && !inputs['check-only'] }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.CLAWSCRIBE_SOURCE_VERSION }}
          name: ClawScribe v${{ env.CLAWSCRIBE_SOURCE_VERSION }}
          body_path: frontend/src-tauri/target/release/bundle/RELEASE-NOTES.md
          prerelease: ${{ contains(env.CLAWSCRIBE_SOURCE_VERSION, '-') }}
          # Mark as the repo's latest release so the updater endpoint
          # (releases/latest/download/latest.json) resolves even for prereleases.
          make_latest: true
          fail_on_unmatched_files: true
          files: |
            frontend/src-tauri/target/release/bundle/msi/ClawScribe_${{ env.CLAWSCRIBE_SOURCE_VERSION }}_x64_en-US.msi
            frontend/src-tauri/target/release/bundle/nsis/ClawScribe_${{ env.CLAWSCRIBE_SOURCE_VERSION }}_x64-setup.exe
            frontend/src-tauri/target/release/bundle/latest.json
            frontend/src-tauri/target/release/bundle/SHA256SUMS.txt
            frontend/src-tauri/target/release/bundle/BUILD-METADATA.txt
