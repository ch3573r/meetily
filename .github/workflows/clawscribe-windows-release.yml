name: ClawScribe Windows Release

on:
  workflow_dispatch:
    inputs:
      feature:
        description: Build acceleration feature
        required: true
        type: choice
        default: cpu
        options:
          - cpu
          - vulkan
          - cuda
          - openblas
      check-only:
        description: Run validation only, without producing installers
        required: true
        type: boolean
        default: false

concurrency:
  group: clawscribe-windows-release-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build ClawScribe Windows installers
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust builds
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            frontend/src-tauri -> frontend/src-tauri/target
          key: clawscribe-windows-${{ inputs.feature }}

      - name: Install LLVM
        shell: pwsh
        run: |
          choco install llvm -y --no-progress
          $llvmBin = "C:\Program Files\LLVM\bin"
          "LIBCLANG_PATH=$llvmBin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "PATH=$llvmBin;$env:PATH" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build llama-helper sidecar
        shell: pwsh
        run: |
          cargo build -p llama-helper --release --target x86_64-pc-windows-msvc
          New-Item -ItemType Directory -Force -Path frontend\src-tauri\binaries | Out-Null
          Copy-Item target\x86_64-pc-windows-msvc\release\llama-helper.exe frontend\src-tauri\binaries\llama-helper-x86_64-pc-windows-msvc.exe -Force

      - name: Build release installers
        if: ${{ !inputs['check-only'] }}
        shell: pwsh
        run: |
          cd frontend
          .\scripts\build-windows-release.ps1 -Feature ${{ inputs.feature }}

      - name: Run validation only
        if: ${{ inputs['check-only'] }}
        shell: pwsh
        run: |
          cd frontend
          .\scripts\build-windows-release.ps1 -Feature ${{ inputs.feature }} -CheckOnly

      - name: Upload Windows installers
        if: ${{ !inputs['check-only'] }}
        uses: actions/upload-artifact@v4
        with:
          name: clawscribe-windows-${{ inputs.feature }}
          path: |
            frontend/src-tauri/target/release/bundle/msi/*.msi
            frontend/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 14
