name: "Validation Check"

# This workflow runs basic validation checks without building
# Use this to verify version and configuration before a release

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validation-check:
    name: Validation Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Get version from tauri.conf.json
        id: get-version
        run: |
          VERSION=$(grep -o '"version": "[^"]*"' frontend/src-tauri/tauri.conf.json | cut -d'"' -f4)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Check current branch
        run: |
          CURRENT_BRANCH="${{ github.ref_name }}"
          echo "Current branch: $CURRENT_BRANCH"

          if [[ "$CURRENT_BRANCH" == "main" ]]; then
            echo "On main branch - ready for release"
          elif [[ "$CURRENT_BRANCH" == "devtest" ]]; then
            echo "On devtest branch - ready for testing"
          else
            echo "On feature branch: $CURRENT_BRANCH"
          fi

      - name: Guard removed legacy backend
        run: |
          if [[ -e backend ]]; then
            echo "::error::The legacy backend/ directory was removed and must not be reintroduced."
            exit 1
          fi

          forbidden="$(git grep -n -E 'backend/|whisper-server-package|jfk\.(wav|mp3)' -- ':!backend/**' ':!.github/workflows/pr-main-check.yml' || true)"
          if [[ -n "$forbidden" ]]; then
            echo "::error::Removed backend references were found."
            echo "$forbidden"
            exit 1
          fi

      - name: Validate version format
        run: |
          VERSION="${{ steps.get-version.outputs.version }}"

          # Check if version matches semantic versioning pattern
          if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version format is valid: $VERSION"
          else
            echo "Warning: Version '$VERSION' may not be in standard semver format"
            echo "Expected format: X.Y.Z (e.g., 1.0.0)"
          fi

      - name: Typecheck frontend
        working-directory: frontend
        run: pnpm typecheck

      - name: Test frontend helpers
        working-directory: frontend
        run: pnpm test

      - name: Generate validation summary
        run: |
          echo "## Validation Check Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.get-version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Checks" >> $GITHUB_STEP_SUMMARY
          echo "- Removed legacy backend guard completed" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend typecheck completed" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend helper tests completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "1. Run **Build and Test - DevTest** for unsigned builds" >> $GITHUB_STEP_SUMMARY
          echo "2. Run **Build and Test** for signed builds on all platforms" >> $GITHUB_STEP_SUMMARY
          echo "3. Run **Release** to create a production release" >> $GITHUB_STEP_SUMMARY
